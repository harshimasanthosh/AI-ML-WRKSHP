<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Obesity Level Predictor</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        display: flex;
        justify-content: center;
        padding: 30px;
    }
    .container {
        background-color: #ffffff;
        padding: 25px 35px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
        width: 420px;
    }
    h2 {
        text-align: center;
        color: #333;
    }
    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 4px;
        font-weight: bold;
        color: #444;
    }
    input, select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background-color: #2e7d32;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background-color: #1b5e20;
    }
    #result {
        margin-top: 20px;
        padding: 12px;
        border-radius: 5px;
        text-align: center;
        font-weight: bold;
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Obesity Level Predictor</h2>

    <label>Age</label>
    <input type="number" id="age" value="21">

    <label>Gender</label>
    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Height (m)</label>
    <input type="number" step="0.01" id="height" value="1.70">

    <label>Weight (kg)</label>
    <input type="number" step="0.1" id="weight" value="70">

    <label>Frequent High Caloric Food</label>
    <select id="favc">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <label>Vegetable Consumption (1-3)</label>
    <input type="number" step="1" min="1" max="3" id="fcvc" value="2">

    <label>Number of Main Meals (1-4)</label>
    <input type="number" step="1" min="1" max="4" id="ncp" value="3">

    <label>Eating Between Meals</label>
    <select id="caec">
        <option>no</option>
        <option>Sometimes</option>
        <option>Frequently</option>
        <option>Always</option>
    </select>

    <label>Do You Smoke</label>
    <select id="smoke">
        <option value="no">No</option>
        <option value="yes">Yes</option>
    </select>

    <label>Daily Water Intake (1-3)</label>
    <input type="number" step="1" min="1" max="3" id="ch2o" value="2">

    <label>Monitor Calorie Consumption</label>
    <select id="scc">
        <option value="no">No</option>
        <option value="yes">Yes</option>
    </select>

    <label>Physical Activity Frequency (0-3)</label>
    <input type="number" step="1" min="0" max="3" id="faf" value="1">

    <label>Time Using Technology Devices (0-2)</label>
    <input type="number" step="1" min="0" max="2" id="tue" value="1">

    <label>Alcohol Consumption</label>
    <select id="calc">
        <option>no</option>
        <option>Sometimes</option>
        <option>Frequently</option>
        <option>Always</option>
    </select>

    <label>Transportation Used</label>
    <select id="mtrans">
        <option value="Public_Transportation">Public Transportation</option>
        <option value="Walking">Walking</option>
        <option value="Automobile">Automobile</option>
        <option value="Motorbike">Motorbike</option>
        <option value="Bike">Bike</option>
    </select>

    <label>Family History With Overweight</label>
    <select id="family_history">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>

    <button onclick="getPrediction()">Predict Obesity Level</button>

    <div id="result"></div>
</div>

<script>
async function getPrediction() {
    const payload = {
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        height: document.getElementById('height').value,
        weight: document.getElementById('weight').value,
        favc: document.getElementById('favc').value,
        fcvc: document.getElementById('fcvc').value,
        ncp: document.getElementById('ncp').value,
        caec: document.getElementById('caec').value,
        smoke: document.getElementById('smoke').value,
        ch2o: document.getElementById('ch2o').value,
        scc: document.getElementById('scc').value,
        faf: document.getElementById('faf').value,
        tue: document.getElementById('tue').value,
        calc: document.getElementById('calc').value,
        mtrans: document.getElementById('mtrans').value,
        family_history: document.getElementById('family_history').value
    };

    const resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    resultBox.style.backgroundColor = '#eee';
    resultBox.innerText = "Predicting...";

    try {
        const response = await fetch('http://127.0.0.1:5000/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (data.prediction) {
            resultBox.style.backgroundColor = '#c8e6c9';
            resultBox.innerText = "Predicted Level: " + data.prediction +
                " (confidence: " + (data.confidence * 100).toFixed(1) + "%)";
        } else {
            resultBox.style.backgroundColor = '#ffcdd2';
            resultBox.innerText = "Error: " + JSON.stringify(data);
        }
    } catch (err) {
        resultBox.style.backgroundColor = '#ffcdd2';
        resultBox.innerText = "Could not reach API. Is app.py running?";
    }
}
</script>

</body>
</html>
